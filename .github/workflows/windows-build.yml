      - name: Compile and Wrap App
        run: |
          # 1. Compile using your exact explicit project and scheme names
          xcodebuild clean build \
            -project ytplus-.xcodeproj \
            -scheme ytplus- \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

          # 2. Package it into the official Apple folder structure
          mkdir -p Payload
          cp -r build/Release-iphoneos/*.app Payload/

          # 3. Zip it and rename the extension to .ipa
          zip -r AppBundle.ipa Payload
